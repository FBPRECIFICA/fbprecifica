<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aprovação de Orçamento - FB Precifica</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f8f9fa;padding:20px;line-height:1.6}
.container{max-width:600px;margin:0 auto;background:white;border-radius:20px;padding:40px;box-shadow:0 8px 32px rgba(0,0,0,0.1)}
.logo{text-align:center;font-size:32px;font-weight:900;color:#111;margin-bottom:8px}
.logo span{color:#F97316}
.header{text-align:center;margin-bottom:32px}
.subtitle{color:#666;font-size:16px}
.info-section{background:#f8f9fa;padding:20px;border-radius:12px;margin:20px 0}
.info-title{font-weight:700;color:#F97316;margin-bottom:8px}
.valor-destaque{font-size:36px;font-weight:900;color:#F97316;text-align:center;margin:24px 0;padding:20px;background:#ffeedd;border-radius:12px}
.detalhes{margin:20px 0}
.linha{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee}
.botoes{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:32px}
.btn{padding:16px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all .3s}
.btn-aprovar{background:#16a34a;color:white}
.btn-aprovar:hover{background:#15803d;transform:translateY(-2px)}
.btn-rejeitar{background:#dc2626;color:white}
.btn-rejeitar:hover{background:#b91c1c;transform:translateY(-2px)}
.status{text-align:center;padding:20px;border-radius:12px;margin:20px 0;font-weight:600}
.status.aprovado{background:#dcfce7;color:#16a34a;border:2px solid #16a34a}
.status.rejeitado{background:#fecaca;color:#dc2626;border:2px solid #dc2626}
.footer{text-align:center;margin-top:32px;padding-top:20px;border-top:1px solid #eee;color:#666;font-size:14px}
.loading{display:none;text-align:center;padding:20px}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">FB<span>precifica</span></div>
    <div class="subtitle">Aprovação de Orçamento</div>
  </div>
  
  <div id="orcamento-content">
    <div class="loading">⏳ Carregando orçamento...</div>
  </div>
</div>

<script>
function getUrlParameter(name) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(name);
}

function fmt(v) {
  return (v || 0).toLocaleString("pt-BR", {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function carregarOrcamento() {
  const orcamentoId = getUrlParameter('id');
  
  if (!orcamentoId) {
    document.getElementById('orcamento-content').innerHTML = `
      <div class="status rejeitado">❌ Link de orçamento inválido</div>
    `;
    return;
  }
  
  // Tentar carregar do localStorage (modo local)
  // Em produção, isso seria uma API call
  try {
    const orcamentos = JSON.parse(localStorage.getItem('fb_orcamentos') || '{}');
    const orcamento = orcamentos[orcamentoId];
    
    if (!orcamento) {
      document.getElementById('orcamento-content').innerHTML = `
        <div class="status rejeitado">❌ Orçamento não encontrado</div>
      `;
      return;
    }
    
    renderizarOrcamento(orcamento);
  } catch (e) {
    document.getElementById('orcamento-content').innerHTML = `
      <div class="status rejeitado">❌ Erro ao carregar orçamento</div>
    `;
  }
}

function renderizarOrcamento(orcamento) {
  const { cliente, veiculo, servicos, totalHoras, totalServicos, valorFinal, pecas, status, oficina, orçamentista } = orcamento;
  
  if (status !== 'pendente') {
    const statusClass = status === 'aprovado' ? 'aprovado' : 'rejeitado';
    const statusIcon = status === 'aprovado' ? '✅' : '❌';
    const statusText = status === 'aprovado' ? 'APROVADO' : 'REJEITADO';
    
    document.getElementById('orcamento-content').innerHTML = `
      <div class="status ${statusClass}">
        ${statusIcon} Este orçamento já foi ${statusText}
      </div>
    `;
    return;
  }
  
  // Lista de serviços
  const servicosHtml = servicos && servicos.length > 0 ? `
    <div class="info-section">
      <div class="info-title">⚙️ Serviços</div>
      ${servicos.map(servico => `
        <div class="linha">
          <span>${servico.servico} (${servico.horas}h)</span>
          <span>R$ ${fmt(servico.preco)}</span>
        </div>
      `).join('')}
      <div class="linha" style="font-weight:bold;background:#f8f9fa;margin-top:8px">
        <span>TOTAL MÃO DE OBRA (${totalHoras || 0}h)</span>
        <span>R$ ${fmt(totalServicos || 0)}</span>
      </div>
    </div>
  ` : '';
  
  const pecasHtml = pecas && pecas.length > 0 ? `
    <div class="info-section">
      <div class="info-title">🔧 Peças e Materiais</div>
      ${pecas.map(peca => `
        <div class="linha">
          <span>${peca.nome} (${peca.qtd}x)</span>
          <span>R$ ${fmt(peca.qtd * peca.valor)}</span>
        </div>
      `).join('')}
    </div>
  ` : '';
  
  document.getElementById('orcamento-content').innerHTML = `
    <div class="info-section">
      <div class="info-title">👤 Cliente</div>
      <p><strong>${cliente}</strong></p>
    </div>
    
    <div class="info-section">
      <div class="info-title">🚗 Veículo</div>
      <p><strong>${veiculo.modelo} ${veiculo.ano}</strong></p>
      <p>Placa: ${veiculo.placa}</p>
    </div>
    
    ${servicosHtml}
    ${pecasHtml}
    
    <div class="valor-destaque">
      VALOR TOTAL: R$ ${fmt(valorFinal)}
    </div>
    
    <div class="botoes">
      <button class="btn btn-aprovar" onclick="aprovarOrcamento('${orcamento.id}')">
        ✅ APROVAR
      </button>
      <button class="btn btn-rejeitar" onclick="rejeitarOrcamento('${orcamento.id}')">
        ❌ REJEITAR  
      </button>
    </div>
    
    <div class="footer">
      <strong>${oficina}</strong><br>
      Orçamentista: ${orçamentista}<br>
      Orçamento válido por 30 dias
    </div>
  `;
}

function aprovarOrcamento(id) {
  atualizarStatus(id, 'aprovado');
}

function rejeitarOrcamento(id) {
  atualizarStatus(id, 'rejeitado');
}

function atualizarStatus(id, novoStatus) {
  try {
    const orcamentos = JSON.parse(localStorage.getItem('fb_orcamentos') || '{}');
    
    if (orcamentos[id]) {
      orcamentos[id].status = novoStatus;
      orcamentos[id].respondidoEm = new Date().toISOString();
      localStorage.setItem('fb_orcamentos', JSON.stringify(orcamentos));
      
      // Mostrar confirmação
      const statusClass = novoStatus === 'aprovado' ? 'aprovado' : 'rejeitado';
      const statusIcon = novoStatus === 'aprovado' ? '✅' : '❌';
      const statusText = novoStatus === 'aprovado' ? 'APROVADO' : 'REJEITADO';
      
      document.getElementById('orcamento-content').innerHTML = `
        <div class="status ${statusClass}">
          ${statusIcon} Orçamento ${statusText} com sucesso!
        </div>
        <div class="footer">
          A oficina foi notificada sobre sua decisão.
        </div>
      `;
    }
  } catch (e) {
    alert('Erro ao atualizar status. Tente novamente.');
  }
}

// Carregar orçamento ao carregar a página
document.addEventListener('DOMContentLoaded', carregarOrcamento);

</script>

</body>
</html>
