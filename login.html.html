<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FB Precifica - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Barlow:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#d6d6d6;--white:#eaeaea;--surf:#d6d6d6;--border:#c2c2c2;--acc:#F97316;--acc2:#ea6c0a;--accl:#ffeedd;--text:#111;--muted:#666;--ok:#16a34a;--err:#dc2626;--warn:#f59e0b;--sh:0 2px 12px rgba(0,0,0,0.12);--shl:0 8px 32px rgba(0,0,0,0.18)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--white);border-radius:20px;padding:40px 32px;width:100%;max-width:420px;box-shadow:var(--shl);text-align:center}
.logo{font-family:'Barlow',sans-serif;font-size:36px;font-weight:900;color:var(--text);letter-spacing:-1px;margin-bottom:8px}
.logo span{color:var(--acc)}
.tag{color:var(--muted);font-size:14px;margin-bottom:32px;line-height:1.5}
.btn-google{width:100%;padding:16px 20px;border-radius:12px;border:2px solid var(--border);background:var(--white);color:var(--text);font-family:'Inter',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:20px}
.btn-google:hover{border-color:var(--acc);background:var(--accl);color:var(--acc);transform:translateY(-1px)}
.btn-google:disabled{opacity:.6;cursor:not-allowed;transform:none}
.google-icon{width:20px;height:20px}
.loading{display:none;align-items:center;justify-content:center;gap:12px;padding:20px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
.error{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);border-radius:12px;padding:12px 16px;color:var(--err);font-size:14px;margin-bottom:16px;display:none}
.info{background:var(--accl);border:1px solid rgba(249,115,22,.2);border-radius:12px;padding:14px 16px;color:var(--acc);font-size:13px;line-height:1.4;margin-bottom:20px}
.footer{margin-top:24px;padding-top:20px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);text-align:center}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="card">
  <div class="logo">FB<span>precifica</span></div>
  <div class="tag">Preço justo para o cliente e para o prestador de serviço</div>
  
  <div class="info">
    <strong>🚀 Entre com sua conta Google</strong><br>
    Sem necessidade de criar senha adicional
  </div>
  
  <div class="error" id="error-msg"></div>
  
  <button class="btn-google" id="btn-login" onclick="loginGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Entrar com Google
  </button>
  
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>Entrando...</span>
  </div>
  
  <div class="footer">
    📧 <strong>Emails de administrador:</strong><br>
    fabio@mmservicecar.com.br<br>
    contato@mmservicecar.com.br<br>
    fabricio@fbprecifica.com.br
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAFLxVIoPzCKiXcgZV_s7dyOr7N-HlUHEk",
  authDomain: "fb-precifica.firebaseapp.com",
  projectId: "fb-precifica",
  storageBucket: "fb-precifica.appspot.com",
  messagingSenderId: "636655637162",
  appId: "1:636655637162:web:8189ede5cc9f1a5c8036d3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// Verificar se já está logado
onAuthStateChanged(auth, (user) => {
  if (user) {
    // Já logado, redirecionar para o app
    window.location.href = "/app.html";
  }
});

window.loginGoogle = async () => {
  const btnLogin = document.getElementById("btn-login");
  const loading = document.getElementById("loading");
  const errorMsg = document.getElementById("error-msg");
  
  // Reset error
  errorMsg.style.display = "none";
  
  // Show loading
  btnLogin.style.display = "none";
  loading.style.display = "flex";
  
  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;
    
    console.log("Login realizado:", user.email);
    
    // Redirecionar para o app
    window.location.href = "/app.html";
    
  } catch (error) {
    console.error("Erro no login:", error);
    
    // Hide loading
    loading.style.display = "none";
    btnLogin.style.display = "flex";
    
    // Show error
    let errorText = "Erro ao fazer login. Tente novamente.";
    
    if (error.code === 'auth/popup-closed-by-user') {
      errorText = "Login cancelado. Tente novamente.";
    } else if (error.code === 'auth/popup-blocked') {
      errorText = "Popup bloqueado. Permita popups e tente novamente.";
    } else if (error.code === 'auth/network-request-failed') {
      errorText = "Erro de rede. Verifique sua conexão.";
    }
    
    errorMsg.textContent = errorText;
    errorMsg.style.display = "block";
  }
};

</script>

</body>
</html>
