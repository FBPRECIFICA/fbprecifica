<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FB Precifica - Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#d6d6d6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#eaeaea;padding:40px;border-radius:20px;width:100%;max-width:400px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.logo{font-size:36px;font-weight:900;color:#111;margin-bottom:8px}
.logo span{color:#F97316}
.tagline{color:#666;font-size:14px;margin-bottom:32px}
.tabs{display:flex;background:#d6d6d6;border-radius:12px;margin-bottom:24px;overflow:hidden}
.tab{flex:1;padding:12px;background:transparent;border:none;color:#666;cursor:pointer;font-weight:600}
.tab.active{background:#F97316;color:white}
.form-group{margin-bottom:16px;text-align:left}
.form-group label{display:block;margin-bottom:5px;font-weight:600;color:#666;font-size:12px}
.form-group input{width:100%;padding:14px;border:1.5px solid #c2c2c2;border-radius:12px;background:#d6d6d6;color:#111;font-size:15px}
.form-group input:focus{outline:none;border-color:#F97316;background:#eaeaea}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#F97316;color:white;margin-bottom:16px}
.btn-primary:hover{background:#ea6c0a;transform:translateY(-1px)}
.error{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);color:#dc2626;padding:12px;border-radius:12px;margin-bottom:16px;font-size:14px;display:none}
.success{background:rgba(22,163,74,.1);border:1px solid rgba(22,163,74,.2);color:#16a34a;padding:12px;border-radius:12px;margin-bottom:16px;font-size:14px;display:none}
.form{display:none}
.form.active{display:block}
</style>
</head>
<body>

<div class="card">
  <div class="logo">FB<span>precifica</span></div>
  <div class="tagline">Preço justo para o cliente e para o prestador de serviço</div>
  
  <div class="tabs">
    <button class="tab active" onclick="trocarAba('login')">Entrar</button>
    <button class="tab" onclick="trocarAba('cadastro')">Cadastrar</button>
  </div>
  
  <div class="error" id="error"></div>
  <div class="success" id="success"></div>
  
  <!-- FORM LOGIN -->
  <div class="form active" id="form-login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="Seu email">
    </div>
    
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="login-senha" placeholder="Sua senha">
    </div>
    
    <button class="btn btn-primary" onclick="fazerLogin()">Entrar</button>
  </div>
  
  <!-- FORM CADASTRO -->
  <div class="form" id="form-cadastro">
    <div class="form-group">
      <label>Nome</label>
      <input type="text" id="cad-nome" placeholder="Seu nome completo">
    </div>
    
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="cad-email" placeholder="Seu email">
    </div>
    
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="cad-senha" placeholder="Mínimo 6 dígitos">
    </div>
    
    <button class="btn btn-primary" onclick="fazerCadastro()">Criar conta</button>
  </div>
</div>

<script>
// Contas válidas (simulando banco de dados)
let usuarios = JSON.parse(localStorage.getItem('fb_usuarios') || '{}');

// Se não tem usuários, criar alguns padrão
if (Object.keys(usuarios).length === 0) {
  usuarios = {
    'contato@mmservicecar.com.br': {
      nome: 'Fábio',
      senha: '123456',
      plano: 'premium',
      isAdmin: true
    },
    'fabio@mmservicecar.com.br': {
      nome: 'Fábio Admin', 
      senha: '123456',
      plano: 'premium',
      isAdmin: true
    },
    'teste@teste.com': {
      nome: 'Usuário Teste',
      senha: '123456',
      plano: 'trial',
      isAdmin: false
    }
  };
  localStorage.setItem('fb_usuarios', JSON.stringify(usuarios));
}

function trocarAba(aba) {
  // Reset abas
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
  
  // Ativar selecionada
  event.target.classList.add('active');
  document.getElementById('form-' + aba).classList.add('active');
  
  esconderMensagens();
}

function fazerLogin() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const senha = document.getElementById('login-senha').value;
  
  if (!email || !senha) {
    mostrarErro("Preencha email e senha");
    return;
  }
  
  if (!usuarios[email]) {
    mostrarErro("Email não encontrado. Cadastre-se primeiro.");
    return;
  }
  
  if (usuarios[email].senha !== senha) {
    mostrarErro("Senha incorreta");
    return;
  }
  
  // Login válido
  const user = usuarios[email];
  
  // Salvar sessão
  localStorage.setItem('fb_sessao', JSON.stringify({
    email: email,
    nome: user.nome,
    plano: user.plano,
    isAdmin: user.isAdmin || false,
    loginTime: new Date().toISOString()
  }));
  
  mostrarSucesso("Login realizado! Redirecionando...");
  
  setTimeout(() => {
    window.location.href = '/app.html';
  }, 1000);
}

function fazerCadastro() {
  const nome = document.getElementById('cad-nome').value.trim();
  const email = document.getElementById('cad-email').value.trim().toLowerCase();
  const senha = document.getElementById('cad-senha').value;
  
  if (!nome || !email || !senha) {
    mostrarErro("Preencha todos os campos");
    return;
  }
  
  if (!email.includes('@')) {
    mostrarErro("Email inválido");
    return;
  }
  
  if (senha.length < 6) {
    mostrarErro("Senha deve ter pelo menos 6 dígitos");
    return;
  }
  
  if (usuarios[email]) {
    mostrarErro("Este email já está cadastrado");
    return;
  }
  
  // Criar conta
  usuarios[email] = {
    nome: nome,
    senha: senha,
    plano: 'trial',
    isAdmin: false,
    criadoEm: new Date().toISOString()
  };
  
  // Salvar
  localStorage.setItem('fb_usuarios', JSON.stringify(usuarios));
  
  mostrarSucesso("Conta criada! Faça login para continuar.");
  
  // Voltar para login
  setTimeout(() => {
    trocarAba('login');
    document.getElementById('login-email').value = email;
  }, 1500);
}

function mostrarErro(msg) {
  document.getElementById('error').textContent = msg;
  document.getElementById('error').style.display = 'block';
  document.getElementById('success').style.display = 'none';
}

function mostrarSucesso(msg) {
  document.getElementById('success').textContent = msg;
  document.getElementById('success').style.display = 'block';
  document.getElementById('error').style.display = 'none';
}

function esconderMensagens() {
  document.getElementById('error').style.display = 'none';
  document.getElementById('success').style.display = 'none';
}

// Enter para submeter
document.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    const loginAtivo = document.getElementById('form-login').classList.contains('active');
    if (loginAtivo) {
      fazerLogin();
    } else {
      fazerCadastro();
    }
  }
});

</script>

</body>
</html>
