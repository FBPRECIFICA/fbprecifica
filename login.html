<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FB Precifica - Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#d6d6d6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#eaeaea;padding:40px;border-radius:20px;width:100%;max-width:400px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.logo{font-size:36px;font-weight:900;color:#111;margin-bottom:8px}
.logo span{color:#F97316}
.tagline{color:#666;font-size:14px;margin-bottom:32px}
.tabs{display:flex;background:#d6d6d6;border-radius:12px;margin-bottom:24px;overflow:hidden}
.tab{flex:1;padding:12px;background:transparent;border:none;color:#666;cursor:pointer;font-weight:600}
.tab.active{background:#F97316;color:white}
.form-group{margin-bottom:16px;text-align:left}
.form-group label{display:block;margin-bottom:5px;font-weight:600;color:#666;font-size:12px}
.form-group input{width:100%;padding:14px;border:1.5px solid #c2c2c2;border-radius:12px;background:#d6d6d6;color:#111;font-size:15px}
.form-group input:focus{outline:none;border-color:#F97316;background:#eaeaea}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#F97316;color:white;margin-bottom:16px}
.btn-primary:hover{background:#ea6c0a;transform:translateY(-1px)}
.btn-primary:disabled{background:#ccc;cursor:not-allowed;transform:none}
.error{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);color:#dc2626;padding:12px;border-radius:12px;margin-bottom:16px;font-size:14px;display:none}
.success{background:rgba(22,163,74,.1);border:1px solid rgba(22,163,74,.2);color:#16a34a;padding:12px;border-radius:12px;margin-bottom:16px;font-size:14px;display:none}
.form{display:none}
.form.active{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">FB<span>precifica</span></div>
  <div class="tagline">Preço justo para o cliente e para o prestador de serviço</div>
  
  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="trocarAba('login')">Entrar</button>
    <button class="tab" id="tab-cadastro" onclick="trocarAba('cadastro')">Cadastrar</button>
  </div>
  
  <div class="error" id="error"></div>
  <div class="success" id="success"></div>
  
  <div class="form active" id="form-login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="Seu email">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="login-senha" placeholder="Sua senha">
    </div>
    <button class="btn btn-primary" id="btn-login" onclick="fazerLogin()">Entrar</button>
  </div>
  
  <div class="form" id="form-cadastro">
    <div class="form-group">
      <label>Nome completo</label>
      <input type="text" id="cad-nome" placeholder="Seu nome completo">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="cad-email" placeholder="Seu email">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="cad-senha" placeholder="Mínimo 6 dígitos">
    </div>
    <button class="btn btn-primary" id="btn-cadastro" onclick="fazerCadastro()">Criar conta</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAFLxVIoPzCKiXcgZV_s7dyOr7N-HlUHEk",
  authDomain: "fb-precifica.firebaseapp.com",
  projectId: "fb-precifica",
  storageBucket: "fb-precifica.firebasestorage.app",
  messagingSenderId: "636655637162",
  appId: "1:636655637162:web:8189ede5cc9f1a5c8036d3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Se já está logado, redireciona direto
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = '/app.html';
  }
});

window.trocarAba = (aba) => {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
  document.getElementById('tab-' + aba).classList.add('active');
  document.getElementById('form-' + aba).classList.add('active');
  esconderMensagens();
}

window.fazerLogin = async () => {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  const btn = document.getElementById('btn-login');

  if (!email || !senha) { mostrarErro("Preencha email e senha"); return; }

  btn.disabled = true;
  btn.textContent = "Entrando...";

  try {
    const cred = await signInWithEmailAndPassword(auth, email, senha);
    const user = cred.user;

    // Verificar se é admin
    const docSnap = await getDoc(doc(db, "usuarios", user.uid));
    const dados = docSnap.exists() ? docSnap.data() : {};
    const isAdmin = dados.isAdmin || false;

    // Salvar sessão mínima — app.html usa onAuthStateChanged
    localStorage.setItem('fb_sessao', JSON.stringify({
      uid: user.uid,
      email: user.email,
      nome: user.displayName || dados.nome || email,
      isAdmin: isAdmin
    }));

    mostrarSucesso("Login realizado! Redirecionando...");
    setTimeout(() => { window.location.href = '/app.html'; }, 800);

  } catch(e) {
    btn.disabled = false;
    btn.textContent = "Entrar";
    if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential') {
      mostrarErro("Email não encontrado ou senha incorreta");
    } else if (e.code === 'auth/wrong-password') {
      mostrarErro("Senha incorreta");
    } else if (e.code === 'auth/too-many-requests') {
      mostrarErro("Muitas tentativas. Aguarde alguns minutos.");
    } else {
      mostrarErro("Erro ao entrar. Tente novamente.");
    }
  }
}

window.fazerCadastro = async () => {
  const nome = document.getElementById('cad-nome').value.trim();
  const email = document.getElementById('cad-email').value.trim();
  const senha = document.getElementById('cad-senha').value;
  const btn = document.getElementById('btn-cadastro');

  if (!nome || !email || !senha) { mostrarErro("Preencha todos os campos"); return; }
  if (senha.length < 6) { mostrarErro("Senha deve ter pelo menos 6 dígitos"); return; }

  btn.disabled = true;
  btn.textContent = "Criando conta...";

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, senha);
    const user = cred.user;

    // Salvar nome no Firebase Auth
    await updateProfile(user, { displayName: nome });

    // Criar documento do usuário no Firestore
    await setDoc(doc(db, "usuarios", user.uid), {
      nome: nome,
      email: email,
      plano: 'trial',
      isAdmin: false,
      criadoEm: new Date().toISOString()
    });

    mostrarSucesso("Conta criada! Faça login para continuar.");
    btn.disabled = false;
    btn.textContent = "Criar conta";

    setTimeout(() => {
      window.trocarAba('login');
      document.getElementById('login-email').value = email;
    }, 1500);

  } catch(e) {
    btn.disabled = false;
    btn.textContent = "Criar conta";
    if (e.code === 'auth/email-already-in-use') {
      mostrarErro("Este email já está cadastrado");
    } else if (e.code === 'auth/invalid-email') {
      mostrarErro("Email inválido");
    } else {
      mostrarErro("Erro ao criar conta. Tente novamente.");
    }
  }
}

function mostrarErro(msg) {
  document.getElementById('error').textContent = msg;
  document.getElementById('error').style.display = 'block';
  document.getElementById('success').style.display = 'none';
}

function mostrarSucesso(msg) {
  document.getElementById('success').textContent = msg;
  document.getElementById('success').style.display = 'block';
  document.getElementById('error').style.display = 'none';
}

function esconderMensagens() {
  document.getElementById('error').style.display = 'none';
  document.getElementById('success').style.display = 'none';
}

document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('form-login').classList.contains('active') ? window.fazerLogin() : window.fazerCadastro();
  }
});
</script>
</body>
</html>
